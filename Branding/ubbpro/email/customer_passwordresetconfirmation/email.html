<html>
<head>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">
<title>{$appname} - Password Reset</title>
</head>
    <body>
        <table style="border: 1px solid #000000; border-collapse : collapse; margin-left: 1%; width:600px;">
            <!-- TAOPIX logo-->
            <tr>
                <td height="80px">
                    <img src="{$brandLogo}" id="headerImage"  height="60px"/>
                </td>
            </tr>
            <tr style="background-color: #575757; text-indent: 12px; font-size: 13px; font-weight:bold; color: #FFFFFF; font-family: Lucida Grande;" >
                <td width="100%" style="padding-top: 5px; padding-bottom: 5px; word-break:break-all;">
                    Your password has been reset
                </td>
            </tr>
            <tr style="padding: 10px; border: 0px solid #CDCDCD; font-size: 12px; line-height: 20px;  display: block; color: #575757; font-family: Lucida Grande;">
                <td>
                    <p><br/>Hello {$contactfirstname},</p>
                    <p>We have successfully changed the password for {$loginname}.<br/><br/></p>
                    <p>{$emailsignature}</p>
                </td>
            </tr>
        </table>
    </body>
</html>
